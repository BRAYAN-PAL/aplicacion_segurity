<ion-content [fullscreen]="true" class="login-background">
  <div class="login-container">
    <form
      [formGroup]="form"
      class="form-card"
      (ngSubmit)="submit()"
      (keypress.enter)="submit()"
    >
      <div class="header-section">
        <div class="logo-wrapper">
          <div class="logo-glow-ring"></div>
          <div class="logo-circle">
            <img
              src="assets/icon/LOGO.png"
              alt="Roma Security"
              class="app-logo"
            />
          </div>
        </div>
        <h1>Login</h1>
        <p>Inicia sesion para continuar</p>
      </div>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" placeholder="Correo" formControlName="email">
        </ion-input>
      </ion-item>

      <div
        class="validators"
        *ngIf="form.controls.email.errors && form.controls.email.touched"
      >
        <div *ngIf="form.controls.email.errors?.['required']">
          El correo es requerido
        </div>
        <div *ngIf="form.controls.email.errors?.['email']">
          Ingrese un correo valido
        </div>
      </div>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          type="password"
          placeholder="Contrasena"
          formControlName="password"
        >
        </ion-input>
      </ion-item>

      <div
        class="validators"
        *ngIf="form.controls.password.errors && form.controls.password.touched"
      >
        <div *ngIf="form.controls.password.errors?.['required']">
          La contrasena es requerida
        </div>
      </div>

      <p routerLink="/auth/forgot-password" class="forgot-password-text">
        ¿Olvidaste tu contrasena?
      </p>

      <ion-button
        expand="block"
        class="login-button"
        type="submit"
        [disabled]="form.invalid || isBusy"
      >
        Ingresar
        <ion-icon slot="end" name="log-in-outline"></ion-icon>
      </ion-button>

      <ion-button
        expand="block"
        fill="outline"
        class="login-button outline-button"
        routerLink="/auth/sign-up"
      >
        Registrate
        <ion-icon slot="end" name="person-add-outline"></ion-icon>
      </ion-button>
    </form>
  </div>
</ion-content>
