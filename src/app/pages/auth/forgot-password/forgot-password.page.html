<app-header backButton="/auth" title="Recuperar Cuenta"></app-header>

<ion-content [fullscreen]="true" class="login-background">
  <div class="login-container">
    <form
      [formGroup]="form"
      class="form-card"
      (ngSubmit)="submit()"
      (keypress.enter)="submit()"
    >
      

      <p class="info-text ion-text-center">
        Te enviaremos un email para que puedas recuperar tu contrasena.
      </p>

      <app-custom-input
        autocomplete="email"
        icon="mail-outline"
        [control]="form.controls.email"
        type="email"
        label="Correo"
      ></app-custom-input>

      <div
        class="validators"
        *ngIf="form.controls.email.errors && form.controls.email.touched"
      >
        <div *ngIf="form.controls.email.errors?.['required']">
          El correo es requerido
        </div>
        <div *ngIf="form.controls.email.errors?.['email']">
          Ingrese un correo valido
        </div>
      </div>

      <ion-button
        expand="block"
        mode="ios"
        class="login-button"
        type="submit"
        [disabled]="form.invalid || isBusy"
      >
        Recuperar
        <ion-icon slot="end" name="arrow-forward"></ion-icon>
      </ion-button>
    </form>
  </div>
</ion-content>
